# Compose parametrizado para prod y dev (WP-only, sin Next.js).
# Variables en .env: INSTANCE, TRAEFIK_ROUTER, TRAEFIK_RULE, TRAEFIK_MIDDLEWARES, DOMAIN_REGEX, DOMAIN_APEX, etc.

services:

  db:
    image: mariadb:10.11
    container_name: db_${INSTANCE}
    restart: unless-stopped
    mem_limit: ${DB_MEM:-1024m}
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./db:/var/lib/mysql
    command: >
      mysqld --character-set-server=utf8mb4
             --collation-server=utf8mb4_unicode_ci
             --max_allowed_packet=256M
             --wait_timeout=28800
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: redis_${INSTANCE}
    restart: unless-stopped
    mem_limit: 256m
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  wp:
    build: .
    container_name: wp_${INSTANCE}
    restart: unless-stopped
    mem_limit: ${WP_MEM:-1024m}
    env_file: .env
    environment:
      WORDPRESS_DB_HOST: db_${INSTANCE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./html:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./php/www-custom.conf:/usr/local/etc/php-fpm.d/zz-custom.conf
      - nginx_cache:/var/cache/nginx/fastcgi
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: nginx_${INSTANCE}
    restart: unless-stopped
    mem_limit: 128m
    environment:
      INSTANCE_WP: wp_${INSTANCE}
      NGINX_ENVSUBST_FILTER: ^INSTANCE_WP$$
    volumes:
      - ./html:/var/www/html
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - nginx_cache:/var/cache/nginx/fastcgi
    depends_on:
      - wp
    networks:
      - traefik_public
      - internal
    labels:
      - "traefik.enable=true"

      # ----- ROUTER -----
      - "traefik.http.routers.${TRAEFIK_ROUTER}.rule=${TRAEFIK_RULE}"
      - "traefik.http.routers.${TRAEFIK_ROUTER}.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER}.tls=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER}.tls.certresolver=cloudflare"

      # ----- MIDDLEWARES (se aplican los listados en TRAEFIK_MIDDLEWARES) -----
      - "traefik.http.middlewares.${TRAEFIK_ROUTER}-www-redirect.redirectregex.regex=^https://www\\.${DOMAIN_REGEX}/(.*)"
      - "traefik.http.middlewares.${TRAEFIK_ROUTER}-www-redirect.redirectregex.replacement=https://${DOMAIN_APEX}/$${1}"
      - "traefik.http.middlewares.${TRAEFIK_ROUTER}-www-redirect.redirectregex.permanent=true"
      - "traefik.http.middlewares.${TRAEFIK_ROUTER}-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.${TRAEFIK_ROUTER}.middlewares=${TRAEFIK_MIDDLEWARES}"

      # ----- SERVICE -----
      - "traefik.http.services.${TRAEFIK_ROUTER}.loadbalancer.server.port=80"

volumes:
  nginx_cache:
    name: nginx_cache_${INSTANCE}

networks:
  traefik_public:
    external: true
  internal:
    name: wp_${INSTANCE}_net
    driver: bridge
