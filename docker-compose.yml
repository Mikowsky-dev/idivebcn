services:

  db_id_prod:
    image: mariadb:10.11
    container_name: db_id_prod
    restart: unless-stopped
    mem_limit: 1024m
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./db:/var/lib/mysql
    command: >
      mysqld --character-set-server=utf8mb4
             --collation-server=utf8mb4_unicode_ci
             --max_allowed_packet=256M
             --wait_timeout=28800
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wp_id_prod_net

  redis_id_prod:
    image: redis:7-alpine
    container_name: redis_id_prod
    restart: unless-stopped
    mem_limit: 256m
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wp_id_prod_net

  wp_id_prod:
    build: .
    container_name: wp_id_prod
    restart: unless-stopped
    mem_limit: 1024m
    env_file: .env
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
    depends_on:
      db_id_prod:
        condition: service_healthy
      redis_id_prod:
        condition: service_healthy
    volumes:
      - ./html:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./php/www-custom.conf:/usr/local/etc/php-fpm.d/zz-custom.conf
      - nginx_cache_id_prod:/var/cache/nginx/fastcgi
    networks:
      - wp_id_prod_net

  nginx_id_prod:
    image: nginx:alpine
    container_name: nginx_id_prod
    restart: unless-stopped
    mem_limit: 128m
    volumes:
      - ./html:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - nginx_cache_id_prod:/var/cache/nginx/fastcgi
    depends_on:
      - wp_id_prod
    networks:
      - traefik_public
      - wp_id_prod_net
    labels:
      - "traefik.enable=true"

      # ----- ROUTER -----
      - "traefik.http.routers.idprod.rule=Host(`idivebcn.com`) || Host(`www.idivebcn.com`)"
      - "traefik.http.routers.idprod.entrypoints=websecure"
      - "traefik.http.routers.idprod.tls=true"
      - "traefik.http.routers.idprod.tls.certresolver=cloudflare"

      # ----- MIDDLEWARE www -> no-www redirect + HTTPS headers -----
      - "traefik.http.middlewares.idprod-www-redirect.redirectregex.regex=^https://www\\.idivebcn\\.com/(.*)"
      - "traefik.http.middlewares.idprod-www-redirect.redirectregex.replacement=https://idivebcn.com/$${1}"
      - "traefik.http.middlewares.idprod-www-redirect.redirectregex.permanent=true"
      - "traefik.http.middlewares.idprod-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.idprod.middlewares=idprod-www-redirect,idprod-headers"

      # ----- SERVICE -----
      - "traefik.http.services.idprod.loadbalancer.server.port=80"

volumes:
  nginx_cache_id_prod:

networks:
  traefik_public:
    external: true
  wp_id_prod_net:
    driver: bridge
